<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">

<meta name="theme-color" content="#849669">
</head>
    
<body>

<header id="title">Мои привычки</header>

<div class="container" id="mainScreen"></div>
<div class="container" id="statsScreen" style="display:none"></div>
<div class="container" id="settingsScreen" style="display:none"></div>

<button class="add-btn" onclick="addHabit()">+</button>

<div class="nav">
    <div onclick="showScreen('main')">Главная</div>
    <div onclick="showScreen('stats')">Статистика</div>
    <div onclick="showScreen('settings')">Настройки</div>
</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js');
}
</script>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3 id="modalTitle">Привычка</h3>

    <input id="nameInput" placeholder="Название"><br><br>
    <input id="goalInput" placeholder="Количество"><br><br>

    <div>
        Дни:
        <div id="days"></div>
    </div>

    <br>
    <button onclick="saveHabit()">Сохранить</button>
    <button onclick="closeModal()">Отмена</button>
  </div>
</div>
  
</body>
</html>
