<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Привычки</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Мои привычки</h2>
</header>

<div class="container" id="mainScreen"></div>

<button class="add-btn" onclick="addHabit()">+</button>

<div class="nav">
  <div>Главная</div>
  <div>Статистика</div>
  <div>Настройки</div>
</div>

<!-- МОДАЛКА -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Привычка</h3>

    <input id="nameInput" placeholder="Название привычки">
    <input id="goalInput" placeholder="Количество">

    <div id="days" class="days"></div>

    <button onclick="saveHabit()">Сохранить</button>
    <button onclick="closeModal()">Отмена</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
